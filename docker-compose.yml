version: '3.9'

services:
  server:
    build: ./server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  # Uncomment when you add local Redis in development:
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
